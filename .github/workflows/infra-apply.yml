name: Infrastructure Apply

on:
  push:
    branches:
      - main
    paths:
      - 'infra/**'

jobs:
  apply:
    name: Terragrunt Apply
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      TERRAGRUNT_NON_INTERACTIVE: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.0
          terraform_wrapper: false

      - name: Setup Terragrunt
        run: |
          wget https://github.com/gruntwork-io/terragrunt/releases/download/v0.53.8/terragrunt_linux_amd64
          chmod +x terragrunt_linux_amd64
          sudo mv terragrunt_linux_amd64 /usr/local/bin/terragrunt
          terragrunt --version

      - name: Terragrunt Apply (Backend)
        working-directory: infra/live/prod
        run: terragrunt apply --terragrunt-non-interactive -auto-approve

      - name: Terragrunt Apply (Frontend)
        working-directory: infra/live/prod/frontend
        run: terragrunt apply --terragrunt-non-interactive -auto-approve
