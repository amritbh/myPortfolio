name: Infrastructure Apply

on:
  push:
    branches:
      - main
    paths:
      - 'infra/**'

jobs:
  apply:
    name: Terragrunt Apply
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      TERRAGRUNT_NON_INTERACTIVE: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.0
          terraform_wrapper: false

      - name: Setup Terragrunt
        run: |
          wget https://github.com/gruntwork-io/terragrunt/releases/download/v0.53.8/terragrunt_linux_amd64
          chmod +x terragrunt_linux_amd64
          sudo mv terragrunt_linux_amd64 /usr/local/bin/terragrunt
          terragrunt --version

      - name: Terraform Format Check
        working-directory: infra
        run: terraform fmt -check -recursive

      - name: Terragrunt Format Check
        working-directory: infra
        run: terragrunt hclfmt --terragrunt-check

      - name: Terragrunt Validate
        working-directory: infra/live
        run: terragrunt run-all validate --terragrunt-non-interactive

      - name: Run tfsec Security Scanner
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: infra
          soft_fail: true

      - name: Run Trivy vulnerability scanner in fs mode
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '0'
          severity: 'HIGH,CRITICAL'

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Run Backend Application Tests & Coverage (pytest & bandit)
        working-directory: infra/modules/backend/src
        run: |
          pip install -r requirements-test.txt
          python -m pytest --cov=. --cov-report=xml test_app.py
          bandit -r . -f custom

      - name: Run Terraform Tests (Backend Module)
        working-directory: infra/modules/backend
        run: terraform init && terraform test

      - name: Run Terraform Tests (Frontend Module)
        working-directory: infra/modules/frontend
        run: terraform init && terraform test

      - name: Terragrunt Apply (Backend)
        working-directory: infra/live/prod
        run: terragrunt apply --terragrunt-non-interactive -auto-approve

      - name: Terragrunt Apply (Frontend)
        working-directory: infra/live/prod/frontend
        run: terragrunt apply --terragrunt-non-interactive -auto-approve
