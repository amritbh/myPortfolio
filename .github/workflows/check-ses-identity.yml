name: Check SES Identities

on:
  push:
    paths:
      - '.github/workflows/check-ses-identity.yml'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Check SES Identities
        run: |
          aws ses list-identities > ses_identities.json
          cat ses_identities.json
          
          echo "Checking verification status for admin@amrit.cloud:"
          aws ses get-identity-verification-attributes --identities admin@amrit.cloud > ses_verification.json
          cat ses_verification.json
