name: Check SES Status

on:
  push:
    paths:
      - '.github/workflows/check-ses.yml'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Check AWS Support Cases
        run: |
          aws support describe-cases --region us-east-1 > support_cases.json || echo "Failed to describe cases" > support_cases.json
          cat support_cases.json
